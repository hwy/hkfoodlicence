<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服務範圍 - 香港餐飲工程及牌照有限公司</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .service-tabs { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
    .tab-btn { padding: 12px 28px; background: #e2e8f0; border-radius: 50px; cursor: pointer; font-weight: 500; transition: 0.3s; }
    .tab-btn.active { background: var(--primary); color: white; }
    .service-content { display: none; }
    .service-content.active { display: block; }
    .service-list { columns: 2; column-gap: 60px; font-size: 1.1rem; line-height: 2.2; }
  </style>
  <script>
    function showTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.service-content').forEach(content => content.classList.remove('active'));
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }
  </script>
</head>
<body>

<header><!-- 同 index.html 的 header --></header>

<main style="margin-top: 100px; padding: 60px 0;">
  <div class="container">
    <h1 class="section-title">服務範圍</h1>

    <div class="service-tabs">
      <div class="tab-btn active" data-tab="engineering" onclick="showTab('engineering')">餐飲裝修工程</div>
      <div class="tab-btn" data-tab="licence" onclick="showTab('licence')">牌照申請代辦</div>
    </div>

    <div id="engineering" class="service-content active">
      <h2 style="color: var(--primary); margin-bottom: 25px;">餐飲裝修工程</h2>
      <div class="service-list">
        <div>廚房設計規劃<br>• 生財設備配置<br>• 工作動線優化<br>• 通風排煙系統設計</div>
        <div>消防通風系統<br>• 符合消防處及屋宇署要求<br>• 提供測試證書</div>
        <div>電力裝置<br>• 三相電申請<br>• 配電箱安裝<br>• 緊急照明系統</div>
        <div>室內裝修<br>• 用餐區風格設計<br>• 牆身地板工程<br>• 傢俬訂造</div>
      </div>
    </div>

    <div id="licence" class="service-content">
      <h2 style="color: var(--primary); margin-bottom: 25px;">牌照申請代辦</h2>
      <div class="service-list">
        <div>普通食肆牌照（大牌）<br>適用於一般餐廳、茶餐廳</div>
        <div>小食食肆牌照（細牌）<br>適用於小食店、外賣專門店</div>
        <div>工廠食堂牌照<br>適用於工廠大廈內食堂</div>
        <div>臨時酒牌<br>配合活動或短期營運</div>
      </div>
    </div>

    <div style="text-align: center; margin-top: 80px;">
      <a href="guarantee.html" class="btn">了解我們的保證出牌計劃 →</a>
    </div>
  </div>
</main>

<footer><!-- 同 index.html 的 footer --></footer>

</body>
</html>
