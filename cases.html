<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案例展示 - 香港餐飲工程及牌照有限公司</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-btns { text-align: center; margin-bottom: 40px; }
    .filter-btn { margin: 0 10px 15px; padding: 10px 22px; background: #e2e8f0; border-radius: 50px; cursor: pointer; display: inline-block; }
    .filter-btn.active { background: var(--primary); color: white; }
    .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
    .case-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.08); transition: 0.3s; }
    .case-card:hover { transform: translateY(-10px); }
    .case-img { height: 220px; background: #ddd; background-size: cover; }
    .case-info { padding: 20px; }
  </style>
  <script>
    function filterCases(category) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.case-card').forEach(card => {
        if (category === 'all' || card.dataset.category === category) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    }
  </script>
</head>
<body>

<header><!-- 同上 --></header>

<main style="margin-top: 100px; padding: 60px 0;">
  <div class="container">
    <h1 class="section-title">成功案例</h1>

    <div class="filter-btns">
      <div class="filter-btn active" onclick="filterCases('all')">全部</div>
      <div class="filter-btn" onclick="filterCases('茶餐廳')">茶餐廳</div>
      <div class="filter-btn" onclick="filterCases('咖啡店')">咖啡店</div>
      <div class="filter-btn" onclick="filterCases('酒吧')">酒吧</div>
      <div class="filter-btn" onclick="filterCases('外賣')">外賣店</div>
    </div>

    <div class="case-grid">
      <div class="case-card" data-category="茶餐廳">
        <div class="case-img" style="background-image: url('https://picsum.photos/id/1015/600/400');"></div>
        <div class="case-info">
          <h3>旺角經典茶餐廳</h3>
          <p>普通食肆牌照 | 工程28天</p>
        </div>
      </div>
      <div class="case-card" data-category="咖啡店">
        <div class="case-img" style="background-image: url('https://picsum.photos/id/201/600/400');"></div>
        <div class="case-info">
          <h3>尖沙咀文青咖啡店</h3>
          <p>小食食肆牌照 | 工程21天</p>
        </div>
      </div>
      <!-- 請自行增加更多案例卡片 -->
    </div>
  </div>
</main>

<footer><!-- 同上 --></footer>

</body>
</html>
