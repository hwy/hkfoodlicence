<!-- 在 contact.html 的 <form> 區塊替換成這個 -->

<form id="contactForm" method="POST" action="https://script.google.com/macros/s/AKfycbxrzkkqJKEO6wlbeRk6RBZOGhAX5l9ATkzmi3LIUydvtk_iv5ZN9G-gxhLB0qhQXDPQ/exec" 
      class="p-4 bg-white rounded shadow" onsubmit="return submitForm(event)">

    <div class="mb-4">
        <label class="form-label fw-bold">姓名 <span class="text-danger">*</span></label>
        <input type="text" name="姓名" class="form-control" required placeholder="請輸入您的姓名">
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">電話 / WhatsApp <span class="text-danger">*</span></label>
        <input type="text" name="電話" class="form-control" required placeholder="例如：62852652">
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">餐廳類型（例如：港式茶餐廳、日式拉麵、咖啡輕食）</label>
        <input type="text" name="餐廳類型" class="form-control" placeholder="請描述您想開的餐廳類型">
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">舖位區域 / 大約地址</label>
        <input type="text" name="舖位地址" class="form-control" placeholder="例如：尖沙咀 / 中環">
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">其他要求 / 問題</label>
        <textarea name="留言" class="form-control" rows="5" placeholder="請詳細描述您的需求，例如舖位面積、預算、開業時間等"></textarea>
    </div>

    <button type="submit" class="btn btn-primary-custom btn-lg w-100">提交諮詢申請</button>
</form>

<!-- 加在 </body> 前，簡單 JS 處理提交後顯示訊息 -->
<script>
    function submitForm(event) {
        event.preventDefault();  // 阻止預設提交
        var form = document.getElementById('contactForm');
        var formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(text => {
            if (text.includes('success')) {
                alert('提交成功！Kit 會盡快聯絡您。');
                form.reset();  // 清空表單
            } else {
                alert('提交失敗，請稍後再試或直接 WhatsApp Kit。錯誤：' + text);
            }
        })
        .catch(error => {
            alert('網路錯誤，請直接致電 6285 2652 或 WhatsApp。');
            console.error(error);
        });

        return false;
    }
</script>
