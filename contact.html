<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>聯絡我們 - 香港餐飲工程及牌照有限公司</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 導航同上，略 -->

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h2 class="section-title text-center">免費諮詢 • 立即開始你的餐飲事業</h2>
            <p class="lead text-center mb-5">填寫以下資料，Kit 會盡快 WhatsApp 或致電你</p>

            <form name="consult" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" class="p-4 bg-white rounded shadow">
                <input type="hidden" name="form-name" value="consult" />

                <p hidden>
                    <label>不要填寫此欄： <input name="bot-field" /></label>
                </p>

                <div class="mb-4">
                    <label class="form-label fw-bold">姓名 <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">電話 / WhatsApp <span class="text-danger">*</span></label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">餐廳類型（例如：港式茶餐廳、日式拉麵、咖啡輕食）</label>
                    <input type="text" name="restaurant_type" class="form-control">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">舖位區域 / 大約地址</label>
                    <input type="text" name="location" class="form-control">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">其他要求 / 問題</label>
                    <textarea name="message" class="form-control" rows="5"></textarea>
                </div>

                <button type="submit" class="btn btn-primary-custom btn-lg w-100">提交諮詢申請</button>
            </form>

            <div class="text-center mt-5">
                <p class="mb-3">或直接聯絡：</p>
                <a href="tel:62852652" class="btn btn-outline-dark btn-lg me-3">致電 Kit 6285 2652</a>
                <a href="https://wa.me/85262852652?text=你好，我想免費諮詢餐廳裝修及飲食牌照" 
                   class="btn btn-whatsapp btn-lg">WhatsApp 即時聊天</a>
            </div>
        </div>
    </div>
</div>

<!-- 頁腳同上，略 -->

</body>
</html>
