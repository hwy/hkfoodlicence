<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>聯絡我們 - 香港餐飲工程及牌照有限公司</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-hero {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            color: white;
            padding: 100px 0 80px;
        }
        .form-card {
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-dark">
    <!-- 你的 nav 保持不變 -->
    <div class="container">
        <a class="navbar-brand" href="index.html">香港餐飲工程及牌照有限公司</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="about.html">關於我們</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">服務項目</a></li>
                <li class="nav-item"><a class="nav-link" href="portfolio.html">成功案例</a></li>
                <li class="nav-item"><a class="nav-link" href="licence.html">牌照申請</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">聯絡我們</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="contact-hero text-center">
    <div class="container">
        <h1 class="display-4 fw-bold mb-3">立即免費諮詢</h1>
        <p class="lead fs-3">專業餐廳裝修 + 飲食牌照 • Kit 會在 1 小時內回覆</p>
    </div>
</header>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card bg-white p-5">
                <form id="contactForm" method="POST" action="https://script.google.com/macros/s/AKfycbxrzkkqJKEO6wlbeRk6RBZOGhAX5l9ATkzmi3LIUydvtk_iv5ZN9G-gxhLB0qhQXDPQ/exec" onsubmit="return submitForm(event)">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">姓名 <span class="text-danger">*</span></label>
                        <input type="text" name="姓名" class="form-control form-control-lg" required placeholder="請輸入您的姓名">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">電話 / WhatsApp <span class="text-danger">*</span></label>
                        <input type="tel" name="電話" class="form-control form-control-lg" required placeholder="62852652">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">餐廳類型</label>
                        <input type="text" name="餐廳類型" class="form-control form-control-lg" placeholder="例如：港式茶餐廳、日式拉麵、咖啡廳">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">舖位區域 / 地址</label>
                        <input type="text" name="舖位地址" class="form-control form-control-lg" placeholder="尖沙咀 / 中環 / 旺角">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">其他要求 / 問題</label>
                        <textarea name="留言" class="form-control form-control-lg" rows="4" placeholder="舖位面積、預算、預計開業時間..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary-custom btn-lg w-100">
                        <span class="submit-text">提交諮詢申請</span>
                        <span class="spinner-border spinner-border-sm d-none" id="loadingSpinner"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 浮動 WhatsApp 按鈕 -->
<a href="https://wa.me/85262852652?text=你好，我想免費諮詢餐廳裝修及飲食牌照" 
   class="position-fixed bottom-0 end-0 m-4 btn btn-whatsapp rounded-circle shadow" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 28px;">
    <i class="fab fa-whatsapp"></i>
</a>

<!-- Toast 提示 -->
<div id="toast" class="toast bg-success text-white p-3 rounded shadow d-none">
    <strong>提交成功！</strong><br>Kit 會盡快 WhatsApp / 致電您
</div>

<footer class="text-center py-4 bg-dark text-white">
    <p>香港餐飲工程及牌照有限公司 © 2026<br>
       聯絡人：Kit 6285 2652 | WhatsApp 即時聊天</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<script>
    function submitForm(event) {
        event.preventDefault();
        const btn = document.getElementById('submitBtn');
        const spinner = document.getElementById('loadingSpinner');
        const text = document.querySelector('.submit-text');

        // 顯示 loading
        text.classList.add('d-none');
        spinner.classList.remove('d-none');
        btn.disabled = true;

        const form = event.target;
        const formData = new FormData(form);

        fetch(form.action, { method: 'POST', body: formData })
            .then(res => res.text())
            .then(result => {
                if (result.includes('success')) {
                    document.getElementById('toast').classList.remove('d-none');
                    form.reset();
                    setTimeout(() => location.reload(), 3000);  // 3秒後刷新
                } else {
                    alert('提交失敗：' + result);
                }
            })
            .catch(() => alert('網路錯誤，請直接 WhatsApp Kit 6285 2652'))
            .finally(() => {
                text.classList.remove('d-none');
                spinner.classList.add('d-none');
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
